name: Tests

on:
  push:
    branches: [main, microscope-agnostic-layer]
  pull_request:
    branches: [main, microscope-agnostic-layer]
  workflow_dispatch:

jobs:
  agnostic-layer:
    name: agnostic layer / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        # The agnostic layer is pure-stdlib and the repo is not a pip package,
        # so the mock suite needs only pytest. conftest.py puts microscopes/ on
        # sys.path, so no install of the package itself is required.
        run: pip install pytest

      - name: Run the mock test suite
        # Only the agnostic-layer mock suite runs in CI: it is fully offline and
        # hardware-free. The driver/calibration suites need LAS X + a microscope
        # and cannot run on GitHub runners.
        run: python -m pytest microscopes/microscope_agnostic_layer/tests --tb=short
