# Complete Conda environment for ZMART Microscopy (macOS/Linux offline CI and
# Windows + LAS X operation).
#
# Every package comes from conda-forge; the conda `defaults` channel is never
# used (`nodefaults` strips it even if the base config adds it implicitly).
#
# Build:  conda env create -f environment.yml      (or: python build_env.py)
# Update: conda env update -f environment.yml --prune

name: zmart-microscopy
channels:
  - conda-forge
  - nodefaults

dependencies:
  # --- interpreter ---
  - python=3.11
  - pip                      # conda-forge python ships without pip; needed for
                             # `pip install -r requirements-dev.txt` (test tools)
  # --- compute core (registration, focusing, image I/O, calibration) ---
  - numpy>=1.24
  - scipy>=1.10
  - scikit-image>=0.22,<0.26 # registration: ORB, RANSAC, phase_cross_correlation
  - opencv>=4.8             # registration: cv2 feature matching
  - tifffile>=2024.1        # read/write OME-TIFF image data
  - pillow>=10              # PNG/image encoding used by reports and widgets
  - ome-types>=0.5          # OME-XML model: validates the driver's OME-TIFF
                            # output (incl. the embedded machine-state block)
  - lxml>=4.9               # ome-types schema-validation backend (validate=True)

  # --- live LAS X API (Python <-> .NET bridge) ---
  # The LAS X CAM API DLLs ship with LAS X and load from the install dir;
  # only the bridge itself is a package.
  - pythonnet>=3.0
  
  # --- diagnostic plots / visualization ---
  # matplotlib drives the calibration report figures and the optional driver
  # diagnostic plots. Runtime code lazy-imports it; the calibration test suite
  # requires it.
  - matplotlib>=3.7
  # Interactive matplotlib canvases used by the v4 operator notebook.
  - ipympl>=0.9
  # React-based notebook widgets (zmart_microscopy_v4_react.ipynb).
  - anywidget>=0.9
  - traitlets>=5.9          # synced widget traits and web-host validation

  # --- plain-browser website validation ---
  # playwright-python drives the real Chromium operator test. nodejs parses
  # all generated ESM modules as JavaScript during the release gate.
  - playwright-python>=1.58,<2
  - nodejs>=20
  
  # --- test / lint tooling ---
  # Folded in so a single `build_env.py` yields a test-ready env: run_ci.py
  # needs pytest + coverage, the calibration tests need ipython, and ruff is
  # pinned explicitly rather than relying on it arriving transitively through
  # ome-types -> xsdata. These are light, and this machine both runs and tests
  # the driver, so there is no lean-production env to keep them out of.
  - pytest>=8
  - pytest-cov>=5
  - ipython>=8
  - ipykernel
  - ruff>=0.6
  # The notebook end-to-end tests (and the thin-notebook guard tests) read
  # and execute the v4 notebooks; without these two the tests silently skip
  # and the notebooks go unchecked.
  - nbformat>=5.9
  - nbclient>=0.9
