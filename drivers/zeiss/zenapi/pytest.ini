# zenapi (ZEISS ZEN API) driver -- pytest configuration.
#
# Makes the driver self-contained: `pytest` from this folder runs the offline
# suite with strict, consistent defaults. run_ci.py layers coverage/report paths
# on top. The offline/online split is explicit via the `hardware` marker.
[pytest]
testpaths = tests

addopts =
    -ra
    --strict-markers
    --strict-config
    --durations=20
    -m "not hardware"

markers =
    hardware: requires a live ZEN + gateway + zen_api wheel. Excluded from the
        default offline run; select with `-m hardware` (or run_ci.py --hardware).
    slow: long-running test (kept in the default run, flagged for --durations).
