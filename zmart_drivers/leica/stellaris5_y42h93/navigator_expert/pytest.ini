# Navigator Expert driver -- pytest configuration.
#
# This file makes the driver self-contained: `pytest` run from this folder
# discovers and runs the driver's offline suite under tests/ with consistent,
# strict defaults. NOTE: calibration/tests is a separate suite that bare
# `pytest` here does NOT collect; run_ci.py runs both and treats both as
# fatal. `run_ci.py` layers coverage + report paths on top of these defaults;
# everything here is what we always want, regardless of how pytest is launched.
[pytest]
testpaths = tests

# -ra                -> end-of-run summary of everything except passes
#                       (skips, xfails, warnings, errors) so nothing is silent.
# --strict-markers   -> an unregistered @pytest.mark.* is an error, not a typo
#                       that silently selects nothing.
# --strict-config    -> a typo in this file is an error, not ignored.
# --durations=20     -> always surface the 20 slowest tests (timing visibility).
#
# JUnit XML and coverage report paths are added by run_ci.py using ABSOLUTE
# paths. pytest resolves a relative --junit-xml against the working directory,
# not this file, so keeping it here would scatter reports wherever pytest was
# launched; run_ci.py pins them to tests/_report/ instead.
addopts =
    -ra
    --strict-markers
    --strict-config
    --durations=20

# Every marker is registered here so --strict-markers can do its job.
# NOTE: no test currently uses either marker. The real mock/hardware split is
# file-based, not marker-based: pytest collects only mock-backed tests
# (including tests/hardware/test_*.py, which are offline gates); live
# validation runs via the tests/hardware/validate_*.py scripts (run_ci.py
# --hardware). run_ci.py's offline `-m "not hardware"` filter therefore deselects
# nothing today; the registrations below exist so a marked test, if one ever
# appears, is not a silent typo.
markers =
    hardware: requires a live LAS X session (simulator or scope). Currently unused.
    slow: long-running test (kept in the default run, but flagged for --durations). Currently unused.
