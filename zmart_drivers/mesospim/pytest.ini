# mesoSPIM driver -- pytest configuration.
#
# Makes the driver self-contained: `pytest` from this folder runs the offline
# suite (mock command server, no mesoSPIM software, no hardware) with strict
# defaults. The `integration` marker is for the against-`-D`-demo-mode round
# trip and is excluded from the default run.
[pytest]
testpaths = tests

addopts =
    -ra
    --strict-markers
    --strict-config
    --durations=10
    -m "not integration"

markers =
    integration: requires a live mesoSPIM (-D demo mode or hardware) with the
        resident command-server script loaded. Excluded from the default offline
        run; select with `-m integration`.
