# mesoSPIM driver -- pytest configuration.
#
# Makes the driver self-contained: `pytest` from this folder runs the offline
# suite (a mock server + the real patched server over sockets, no mesoSPIM
# software, no hardware) with strict defaults. The `integration` marker is for
# the against-`-D`-demo-mode round trip and is excluded from the default run.
#
# tests/         -- the driver's own client / controller / reader tests.
# pull_request/  -- the shipped-with-the-PR test of the real server (framing,
#                   auth, dispatch, MCP/HTTP, and a full end-to-end pass).
[pytest]
testpaths = tests pull_request

addopts =
    -ra
    --strict-markers
    --strict-config
    --durations=10
    -m "not integration"

markers =
    integration: requires a live mesoSPIM (-D demo mode or hardware) with the
        Remote Scripting server started. Excluded from the default offline
        run; select with `-m integration`.
