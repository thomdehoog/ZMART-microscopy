# Conda environment for the ZMART visualization studio.
#
# This installs everything the *running* tool needs on the microscope PC:
# Python, the array library, the OME-Zarr writer, and the native-window
# library. It deliberately avoids heavy web frameworks — the server is Python's
# built-in one — so the install stays small and offline-friendly.
#
# Node.js is included only to *build* the viewer web page from source. Once the
# page is built (into frontend/dist) it is plain files, and an end user who is
# handed a pre-built copy does not need Node at all.
#
# Create it with:   conda env create -f environment.yml
# then:             conda activate zmart-viz && python run_demo.py

name: zmart-viz
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python>=3.11
  - numpy
  # Writes the image volume in OME-Zarr. zarr-python 3.x writes the widely-read
  # version-2 on-disk layout that the viewer engine reads most reliably.
  - zarr>=3
  # The .NET bridge pywebview's Windows (WebView2) backend needs. This one is
  # genuinely on conda-forge, so it is pinned here rather than left to pip.
  - pythonnet
  # Build-time only: compiles the viewer web page. Not needed by an end user who
  # receives a pre-built page.
  - nodejs>=20
  - pip
  - pip:
      # Opens the viewer in a native desktop window using the operating system's
      # own web engine (WebView2/Chromium on Windows) — lightweight, no bundled
      # browser. It comes from pip because conda-forge does not package
      # pywebview at all; listing it as a conda dependency makes the documented
      # `conda env create` fail outright with PackagesNotFoundError.
      - pywebview
      # Optional: drives a real browser for the automated rendering check
      # (backend/browsercheck.py). Handy for developers, not required to run.
      # Also pip, for a subtler reason: conda-forge *does* have a `playwright`,
      # but it is the Node.js package (it installs
      # Library/share/playwright/node_modules and no Python module at all), so
      # installing it leaves `import playwright` failing and the check skipping.
      - playwright
# After creating the environment, the optional render check needs a one-time
# browser download: `playwright install chromium`. On a machine whose policy
# blocks executables under the user profile (AppLocker/SRP), point that download
# somewhere allowed first by setting PLAYWRIGHT_BROWSERS_PATH — otherwise
# Chromium downloads successfully and then dies with "spawn UNKNOWN".
