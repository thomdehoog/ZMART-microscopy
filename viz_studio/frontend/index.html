<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZMART Viz Studio</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
        width: 100%;
        background: #0b0d10;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      /* neuroglancer's own stylesheet sizes its viewer by assuming it fills the
         page body. When we embed it inside our own layout instead, its viewer
         element has no height and collapses to just its toolbar. Making the
         viewer fill whatever box we mount it into restores a full-size canvas. */
      .neuroglancer-viewer {
        position: absolute;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
